      <stop offset="0%" stop-color="#B51E28"/>
      <stop offset="100%" stop-color="#7A1018"/>
    </linearGradient>
    <linearGradient id="goldLineT" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A574" stop-opacity="0"/>
      <stop offset="50%" stop-color="#E8C999" stop-opacity="1"/>
